<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusFlow Login</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;

background:linear-gradient(
135deg,
#020617,
#0f172a,
#1e3a8a,
#2563eb
);

background-size:400% 400%;
animation:bgFlow 12s ease infinite;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.login-container{
width:420px;

background:rgba(15,23,42,0.92);

backdrop-filter:blur(20px);

padding:40px;

border-radius:24px;

border:1px solid rgba(59,130,246,.3);

box-shadow:
0 0 30px rgba(37,99,235,.4),
0 0 80px rgba(37,99,235,.15);

text-align:center;

color:white;
}

.logo{
font-size:70px;
margin-bottom:10px;
}

.login-container h1{
font-size:48px;
margin-bottom:10px;
color:white;
text-shadow:0 0 20px #60a5fa;
}

.login-container p{
color:#cbd5e1;
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
text-align:left;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#dbeafe;
}

.input-group input{
width:100%;
padding:15px;

background:#0f172a;

border:1px solid #3b82f6;

border-radius:12px;

color:white;

font-size:15px;

outline:none;

box-sizing:border-box;
}

.input-group input:focus{
border-color:#60a5fa;
box-shadow:0 0 15px rgba(59,130,246,.5);
}

.login-btn{
width:100%;
padding:15px;

border:none;
border-radius:12px;

background:linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px rgba(59,130,246,.5);
}

.login-btn:hover{
transform:translateY(-3px);

box-shadow:
0 0 30px rgba(59,130,246,.8);

background:linear-gradient(
135deg,
#3b82f6,
#60a5fa
);
}

.demo{
margin-top:20px;
color:#cbd5e1;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">🎓</div>

<h1>CampusFlow</h1>

<p>Smart Campus Management System</p>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password">
</div>

<button class="login-btn" onclick="login()">
Login
</button>

<div class="demo">
Demo Login: admin@campusflow.com
</div>

</div>

<script>

function login(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

if(email && password){

window.location.href="admin-dashboard.html";

}
else{

alert("Please enter Email and Password");

}

}

</script>

</body>
</html>
